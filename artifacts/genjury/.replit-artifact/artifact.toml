kind = "web"
previewPath = "/"
title = "Genjury"
version = "1.0.0"
id = "artifacts/genjury"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24859

[services.development]
run = "pnpm --filter @workspace/genjury run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/genjury", "run", "build" ]
publicDir = "artifacts/genjury/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24859"
BASE_PATH = "/"
